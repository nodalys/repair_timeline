<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <style>
    .chart-title { font-family: Arial, sans-serif; font-size: 20px; fill: #555555; text-anchor: middle; }
    .axis-line { stroke: #cbd5e1; stroke-width: 1.5; }
    .grid-line { stroke: #f1f5f9; stroke-width: 1; }
    .x-tick { font-family: Arial, sans-serif; font-size: 13px; fill: #555555; text-anchor: middle; }
    .legend-text { font-family: Arial, sans-serif; font-size: 14px; fill: #444444; }
    .line-asia { fill: none; stroke: #e67e22; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .line-row { fill: none; stroke: #1e7e34; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="500" y="35" class="chart-title">Asia-Middle East repair frequency vs. rest of the World</text>

  <g>
    <line x1="100" y1="90" x2="900" y2="90" class="grid-line"/>
    <line x1="100" y1="140" x2="900" y2="140" class="grid-line"/>
    <line x1="100" y1="190" x2="900" y2="190" class="grid-line"/>
    <line x1="100" y1="240" x2="900" y2="240" class="grid-line"/>
    <line x1="100" y1="290" x2="900" y2="290" class="grid-line"/>
    <line x1="100" y1="340" x2="900" y2="340" class="axis-line"/>
  </g>

  <g>
    <text x="100" y="365" class="x-tick">2015</text>
    <text x="180" y="365" class="x-tick">2016</text>
    <text x="260" y="365" class="x-tick">2017</text>
    <text x="340" y="365" class="x-tick">2018</text>
    <text x="420" y="365" class="x-tick">2019</text>
    <text x="500" y="365" class="x-tick">2020</text>
    <text x="580" y="365" class="x-tick">2021</text>
    <text x="660" y="365" class="x-tick">2022</text>
    <text x="740" y="365" class="x-tick">2023</text>
    <text x="820" y="365" class="x-tick">2024</text>
    <text x="900" y="365" class="x-tick">2025</text>
  </g>

  <path d="M 100 105 L 180 135 L 260 85 L 340 185 L 420 205 L 500 115 L 580 185 L 660 185 L 740 145 L 820 105 L 900 135" class="line-asia" />

  <path d="M 100 275 L 180 255 L 260 195 L 340 265 L 420 315 L 500 295 L 580 315 L 660 315 L 740 255 L 820 285 L 900 340" class="line-row" />

  <g transform="translate(360, 395)">
    <line x1="0" y1="7" x2="25" y2="7" class="line-asia" stroke-width="4"/>
    <text x="35" y="12" class="legend-text">Asia &amp; Middle East</text>

    <line x1="210" y1="7" x2="235" y2="7" class="line-row" stroke-width="4"/>
    <text x="245" y="12" class="legend-text">Rest of the World</text>
  </g>
</svg>
